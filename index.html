<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doğum Günü</title>

<style>
body{
    margin:0;
    background:linear-gradient(#f8a5c2,#f78fb3);
    text-align:center;
    font-family:cursive;
    overflow-x:hidden;
}

/* ÜST VİDEO (başta gizli) */
#topVideoBox{
    display:none;
    width:90%;
    max-width:400px;
    height:250px;
    margin:40px auto 20px auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}
#topVideoBox video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ZARF */
.envelope{
    width:300px;
    height:200px;
    background:#ffb6c1;
    margin:100px auto;
    position:relative;
    cursor:pointer;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.5s;
}
.envelope:before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom right,#ff8fab,#ffb6c1);
    clip-path:polygon(0 0,100% 0,50% 60%);
}
.click-text{
    position:absolute;
    width:100%;
    top:80px;
    font-size:22px;
    color:white;
    font-weight:bold;
}

/* YAZI */
.message{
    display:none;
    font-size:28px;
    color:white;
    margin-top:20px;
    padding:0 20px;
}

/* ALT VİDEO */
#bottomVideoBox{
    display:none;
    width:90%;
    max-width:400px;
    margin:30px auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}
#bottomVideoBox video{
    width:100%;
}

/* KALP */
.heart{
    position:fixed;
    bottom:-10px;
    font-size:20px;
    animation:floatUp 4s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0) scale(1); opacity:1;}
    100%{transform:translateY(-800px) scale(1.5); opacity:0;}
}

/* KONFETİ */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:0;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{transform:translateY(800px) rotate(360deg); opacity:0;}
}
</style>
</head>

<body>

<!-- 🎵 MÜZİK -->
<audio id="music" loop>
    <source src="muzik.mp3" type="audio/mp3">
</audio>

<!-- ÜST VİDEO -->
<div id="topVideoBox">
    <video autoplay muted loop controls>
        <source src="ustvideo.mp4" type="video/mp4">
    </video>
</div>

<!-- ZARF -->
<div class="envelope" onclick="openLetter()" id="envelope">
    <div class="click-text">TIKLA 💌</div>
</div>

<!-- YAZI -->
<div class="message" id="message">
🌸✨ DOĞUM GÜNÜN KUTLU OLSUN ANNECİM 🧸💖<br>
İYİ Kİ DOĞDUN 🎂🎉🥳💫
</div>

<!-- ALT VİDEO -->
<div id="bottomVideoBox">
    <video autoplay muted loop controls>
        <source src="altvideo.mp4" type="video/mp4">
    </video>
</div>

<script>
function openLetter(){

    // 🎵 MÜZİĞİ BAŞLAT
    let music = document.getElementById("music");
    music.play();

    // ZARFI GİZLE
    document.getElementById("envelope").style.display="none";

    // YAZIYI GÖSTER
    document.getElementById("message").style.display="block";

    // VİDEOLARI GÖSTER
    document.getElementById("topVideoBox").style.display="block";
    document.getElementById("bottomVideoBox").style.display="block";

    // KONFETİ
    for(let i=0;i<50;i++){
        let conf=document.createElement("div");
        conf.className="confetti";
        conf.style.left=Math.random()*100+"%";
        conf.style.background="hsl("+Math.random()*360+",100%,50%)";
        conf.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),3000);
    }

    // UÇAN KALPLER
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"%";
        heart.style.animationDuration=(3+Math.random()*2)+"s";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    },300);
}
</script>

</body>
</html>
