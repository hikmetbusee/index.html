<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Doğum Günü</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:linear-gradient(#f8a5c2,#f78fb3);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:cursive;
    overflow:hidden;
}

.story{
    width:100%;
    max-width:430px;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    text-align:center;
}

#topVideoBox, #bottomVideoBox{
    display:none;
    width:90%;
    border-radius:20px;
    overflow:hidden;
    margin:10px 0;
}
video{
    width:100%;
    height:auto;
}

.envelope{
    width:80%;
    max-width:280px;
    height:180px;
    background:#ffb6c1;
    position:relative;
    cursor:pointer;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}
.envelope:before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom right,#ff8fab,#ffb6c1);
    clip-path:polygon(0 0,100% 0,50% 60%);
}
.click-text{
    position:absolute;
    width:100%;
    top:70px;
    font-size:20px;
    color:white;
    font-weight:bold;
}

.message{
    display:none;
    font-size:22px;
    color:white;
    margin:15px 20px;
}

.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    animation:floatUp 4s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-100vh); opacity:0;}
}

.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:0;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{transform:translateY(100vh) rotate(360deg); opacity:0;}
}
</style>
</head>

<body>

<!-- 🎵 GARANTİ MÜZİK (video yöntemi) -->
<video id="music" src="muzik.mp3" style="display:none;"></video>

<div class="story">

<div id="topVideoBox">
    <video autoplay muted loop playsinline>
        <source src="ustvideo.mp4" type="video/mp4">
    </video>
</div>

<div class="envelope" onclick="openLetter()" id="envelope">
    <div class="click-text">TIKLA 💌</div>
</div>

<div class="message" id="message">
🌸✨ DOĞUM GÜNÜN KUTLU OLSUN ANNECİM 🧸💖<br>
İYİ Kİ DOĞDUN 🎂🎉🥳💫
</div>

<div id="bottomVideoBox">
    <video autoplay muted loop playsinline>
        <source src="altvideo.mp4" type="video/mp4">
    </video>
</div>

</div>

<script>
function openLetter(){

    // 🎵 MÜZİK BAŞLAT (garanti yöntem)
    const music = document.getElementById("music");
    music.volume = 1;
    music.play().catch(()=>{});

    // GÖSTER / GİZLE
    document.getElementById("envelope").style.display="none";
    document.getElementById("message").style.display="block";
    document.getElementById("topVideoBox").style.display="block";
    document.getElementById("bottomVideoBox").style.display="block";

    // KONFETİ
    for(let i=0;i<40;i++){
        let conf=document.createElement("div");
        conf.className="confetti";
        conf.style.left=Math.random()*100+"%";
        conf.style.background="hsl("+Math.random()*360+",100%,50%)";
        document.querySelector(".story").appendChild(conf);
        setTimeout(()=>conf.remove(),3000);
    }

    // KALP
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"%";
        document.querySelector(".story").appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    },300);
}
</script>

</body>
</html>
